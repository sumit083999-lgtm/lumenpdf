    <!-- Script Logic -->
    <script>
        let selectedFiles = [];

        function handleImageSelection() {
            const input = document.getElementById('imageInput');
            if (input.files.length === 0) return;

            const filesArray = Array.from(input.files);
            selectedFiles = selectedFiles.concat(filesArray);

            updateUI();
        }

        function updateUI() {
            const previewGrid = document.getElementById('previewGrid');
            const statusCard = document.getElementById('statusCard');
            const fileCountLabel = document.getElementById('fileCount');
            const convertBtn = document.getElementById('convertBtn');

            if (selectedFiles.length === 0) {
                statusCard.classList.add('hidden');
                convertBtn.setAttribute('disabled', 'true');
                document.getElementById('imageInput').value = ''; // Input clear clear
                return;
            }

            fileCountLabel.innerText = `${selectedFiles.length} ${selectedFiles.length === 1 ? 'File' : 'Files'}`;
            statusCard.classList.remove('hidden');
            convertBtn.removeAttribute('disabled');

            previewGrid.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const thumbWrapper = document.createElement('div');
                    thumbWrapper.className = 'relative aspect-square bg-[#1A1A1A] rounded-lg overflow-hidden border border-gray-800';
                    thumbWrapper.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-full object-cover">
                        <button onclick="removeImage(${index})" class="absolute top-1 right-1 w-5 h-5 bg-black/70 text-white text-xs rounded-full flex items-center justify-center font-bold hover:bg-red-600 transition">×</button>
                    `;
                    previewGrid.appendChild(thumbWrapper);
                }
                reader.readAsDataURL(file);
            });
        }

        function removeImage(index) {
            selectedFiles.splice(index, 1);
            updateUI();
        }

        async function generatePDF() {
            if (selectedFiles.length === 0) return;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            const convertBtn = document.getElementById('convertBtn');
            
            convertBtn.innerText = 'GENERATING PDF...';
            convertBtn.setAttribute('disabled', 'true');

            for (let i = 0; i < selectedFiles.length; i++) {
                if (i > 0) pdf.addPage();
                
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = function() {
                            const pageWidth = pdf.internal.pageSize.getWidth();
                            const pageHeight = pdf.internal.pageSize.getHeight();
                            
                            const imgWidth = img.width;
                            const imgHeight = img.height;
                            const ratio = Math.min(pageWidth / imgWidth, pageHeight / imgHeight);
                            
                            const newWidth = imgWidth * ratio;
                            const newHeight = imgHeight * ratio;
                            const xXis = (pageWidth - newWidth) / 2;
                            const yXis = (pageHeight - newHeight) / 2;

                            pdf.addImage(img, 'JPEG', xXis, yXis, newWidth, newHeight);
                            resolve();
                        };
                    };
                    reader.readAsDataURL(selectedFiles[i]);
                });
            }

            pdf.save('LumenPDF_Document.pdf');
            
            // 🔥 FULL COMPREHENSIVE RESET FOR MOBILE BROWSERS
            selectedFiles = []; 
            document.getElementById('imageInput').value = ''; 
            updateUI(); 
            
            convertBtn.innerText = 'CONVERT TO PDF';
        }
    </script>
